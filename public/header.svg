<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1410"/>
      <stop offset="1" stop-color="#0d0907"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#D4A649" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#D4A649" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="200" fill="url(#bg)"/>
  <ellipse cx="300" cy="100" rx="220" ry="100" fill="url(#glow)"/>

  <!-- Logo LIGEIA estilizado -->
  <g transform="translate(155, 60)" fill="#D4A649" font-family="Georgia, serif">
    <text x="0" y="55" font-size="72" font-weight="bold" letter-spacing="6">LIGEIA</text>
    <text x="120" y="80" font-size="20" letter-spacing="12" fill="#8B6914">RPG</text>
    <!-- Sublinha dourada decorativa -->
    <line x1="-10" y1="65" x2="300" y2="65" stroke="#8B6914" stroke-width="1"/>
    <line x1="-10" y1="68" x2="300" y2="68" stroke="#8B6914" stroke-width="0.5"/>
  </g>

  <!-- Detalhes decorativos -->
  <circle cx="60" cy="100" r="2" fill="#D4A649"/>
  <circle cx="540" cy="100" r="2" fill="#D4A649"/>
  <path d="M 30 100 L 55 100 M 545 100 L 570 100" stroke="#8B6914" stroke-width="1"/>
</svg>
